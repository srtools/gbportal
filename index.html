<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GB Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --sidebar-color: #800040; --main-bg-color: #4d0026; --accent-red: #ff0055; }
        body { font-family: 'Inter', sans-serif; background: var(--main-bg-color); color: #ffffff; min-height: 100vh; margin: 0; display: flex; overflow-x: hidden; }
        aside { width: 320px; background: var(--sidebar-color); height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid rgba(255, 255, 255, 0.1); z-index: 50; box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        main { margin-left: 320px; flex: 1; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; width: calc(100% - 320px); }
        .glass { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-add { background: #000000; transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-add:not(:disabled):hover { background: var(--accent-red); border-color: transparent; }
        .btn-add:disabled { opacity: 0.3; cursor: not-allowed; }
        .task-done { text-decoration: line-through; opacity: 0.3; }
        #auth-overlay { position: fixed; inset: 0; background: var(--main-bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .link-item { height: 50px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; display: flex; align-items: center; padding: 0 1rem; border-radius: 12px; margin-bottom: 8px; text-decoration: none; color: white; }
        .link-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="text-4xl font-black italic mb-4 animate-pulse">GB PORTAL</div>
        <div id="status-text" class="flex flex-col items-center space-y-2 text-white/50 text-xs font-bold uppercase tracking-widest">
            <div class="flex items-center space-x-2">
                <i class="fas fa-circle-notch animate-spin"></i>
                <span>Initialising Cloud Core...</span>
            </div>
            <div id="error-display" class="text-red-400 mt-4 text-center hidden"></div>
        </div>
    </div>

    <aside class="p-6 overflow-y-auto custom-scrollbar">
        <h1 class="text-3xl font-black italic tracking-tighter mb-8">GB PORTAL</h1>
        <div class="space-y-4 mb-10">
            <div class="glass p-4 rounded-2xl border-l-4 border-white">
                <div id="clock" class="text-3xl font-black tracking-tighter">00:00:00</div>
                <div id="date" class="text-white/60 text-[10px] font-bold uppercase">202X/XX/XX</div>
            </div>
            <div class="glass p-4 rounded-2xl flex items-center justify-around border-l-4 border-white">
                <i class="fas fa-cloud-sun text-2xl"></i>
                <div class="text-right">
                    <div id="temp" class="text-xl font-black">--°C</div>
                    <div class="text-[9px] font-bold text-white/40 uppercase">Setagaya</div>
                </div>
            </div>
        </div>
        <nav>
            <h2 class="text-[10px] font-black text-white/30 uppercase tracking-[0.3em] mb-4 italic">Quick Access</h2>
            <div id="nav-links">
                <a href="https://google.com" target="_blank" class="link-item"><i class="fab fa-google w-8"></i><span class="text-xs font-bold">Google</span></a>
                <a href="https://gladd.jp" target="_blank" class="link-item"><i class="fas fa-shopping-bag w-8"></i><span class="text-xs font-bold">GLADD</span></a>
                <a href="https://youtube.com" target="_blank" class="link-item"><i class="fab fa-youtube w-8"></i><span class="text-xs font-bold">YouTube</span></a>
                <a href="https://maps.google.com" target="_blank" class="link-item"><i class="fas fa-map w-8"></i><span class="text-xs font-bold">Maps</span></a>
            </div>
        </nav>
    </aside>

    <main>
        <header class="flex justify-end">
            <form action="https://www.google.com/search" method="GET" class="relative w-full max-w-md">
                <input type="text" name="q" placeholder="Search anything..." class="w-full glass py-3 px-12 rounded-2xl focus:outline-none focus:ring-1 focus:ring-white/20 font-bold">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/30"></i>
            </form>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 flex-1">
            <section class="glass p-8 rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic uppercase tracking-widest"><i class="fas fa-tasks mr-3 text-red-500"></i>ToDo</h2>
                    <span id="sync-status" class="text-[9px] border border-white/10 px-2 py-1 rounded font-bold uppercase text-white/30">Syncing...</span>
                </div>
                <form id="todo-form" class="flex gap-2 mb-8">
                    <input type="text" id="todo-input" placeholder="New Task..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-white/30" disabled>
                    <button type="submit" class="btn-add px-6 rounded-xl font-black uppercase text-[10px]" disabled>Add</button>
                </form>
                <ul id="todo-list" class="space-y-3 overflow-y-auto custom-scrollbar flex-1"></ul>
            </section>

            <section class="glass p-8 rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic uppercase tracking-widest"><i class="fas fa-history mr-3 text-red-500"></i>Backlog</h2>
                </div>
                <form id="task-form" class="flex gap-2 mb-8">
                    <input type="text" id="task-input" placeholder="Archive Item..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-white/30" disabled>
                    <button type="submit" class="btn-add px-6 rounded-xl font-black uppercase text-[10px]" disabled>Add</button>
                </form>
                <ul id="task-list" class="space-y-3 overflow-y-auto custom-scrollbar flex-1"></ul>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // 環境変数ガード: プレビュー環境でもGitHubでも動くようにする
        const getFirebaseConfig = () => {
            try {
                if (typeof __firebase_config !== 'undefined') return JSON.parse(__firebase_config);
            } catch (e) {}
            return {
                apiKey: "AIzaSyDKHhyvzIQXTKnDfEgtWpPakvDy5Cq03h4",
                authDomain: "portal-15d55.firebaseapp.com",
                projectId: "portal-15d55",
                storageBucket: "portal-15d55.firebasestorage.app",
                messagingSenderId: "684831198991",
                appId: "1:684831198991:web:e8bc5844826a414659f87a"
            };
        };

        const getAppId = () => {
            if (typeof __app_id !== 'undefined') return __app_id;
            return 'gb-portal-v6-stable'; // 固定にすることでGitHub上でデータが消えるのを防ぐ
        };

        const config = getFirebaseConfig();
        const sharedAppId = getAppId();
        
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 指数バックオフ付きリトライ
        async function robustSignIn(retries = 5, delay = 1000) {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                if (retries > 0) {
                    setTimeout(() => robustSignIn(retries - 1, delay * 2), delay);
                } else {
                    const errDisp = document.getElementById('error-display');
                    errDisp.textContent = `Cloud Error: ${err.code}. Check Firebase Console domains.`;
                    errDisp.classList.remove('hidden');
                }
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 500);
                document.querySelectorAll('input, button').forEach(el => el.disabled = false);
                document.getElementById('sync-status').textContent = "Live Cloud Active";
                document.getElementById('sync-status').classList.replace('text-white/30', 'text-green-400');
                
                initSync('todos', 'todo-list');
                initSync('tasks', 'task-list');
            } else {
                robustSignIn();
            }
        });

        function initSync(collectionName, listId) {
            const colRef = collection(db, 'artifacts', sharedAppId, 'public', 'data', collectionName);
            onSnapshot(colRef, (snapshot) => {
                const list = document.getElementById(listId);
                list.innerHTML = '';
                const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // クライアントサイドソート
                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between p-4 glass rounded-2xl border-l-2 border-white/50 transition-all hover:bg-white/5';
                    li.innerHTML = `
                        <div class="flex items-center space-x-4 overflow-hidden">
                            <button class="toggle-btn flex-shrink-0 w-5 h-5 rounded border-2 border-white/20 flex items-center justify-center ${item.completed ? 'bg-white border-white' : ''}">
                                ${item.completed ? '<i class="fas fa-check text-[10px] text-black"></i>' : ''}
                            </button>
                            <span class="font-bold text-sm truncate ${item.completed ? 'task-done' : ''}">${item.text}</span>
                        </div>
                        <button class="delete-btn text-white/20 hover:text-red-500 transition-colors ml-4"><i class="fas fa-trash-alt text-xs"></i></button>
                    `;
                    
                    const docRef = doc(db, 'artifacts', sharedAppId, 'public', 'data', collectionName, item.id);
                    li.querySelector('.toggle-btn').onclick = () => updateDoc(docRef, { completed: !item.completed });
                    li.querySelector('.delete-btn').onclick = () => deleteDoc(docRef);
                    list.appendChild(li);
                });
            }, (err) => console.error(err));
        }

        const handleAdd = async (e, inputId, colName) => {
            e.preventDefault();
            const input = document.getElementById(inputId);
            if (!input.value.trim()) return;
            try {
                await addDoc(collection(db, 'artifacts', sharedAppId, 'public', 'data', colName), {
                    text: input.value.trim(),
                    completed: false,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            } catch (e) { console.error(e); }
        };

        document.getElementById('todo-form').onsubmit = (e) => handleAdd(e, 'todo-input', 'todos');
        document.getElementById('task-form').onsubmit = (e) => handleAdd(e, 'task-input', 'tasks');

        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
        }, 1000);

        // Weather
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6465&longitude=139.6533&current_weather=true&timezone=Asia%2FTokyo');
                const data = await res.json();
                document.getElementById('temp').textContent = `${Math.round(data.current_weather.temperature)}°C`;
            } catch (e) {}
        }
        fetchWeather();
    </script>
</body>
</html>
