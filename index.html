<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GB Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --sidebar-left-color: #800040; 
            --sidebar-right-color: #2a0015; 
            --main-bg-color: #4d0026; 
            --accent-red: #ff0055; 
            --accent-blue: #60a5fa; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--main-bg-color); 
            color: #ffffff; 
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            overflow: hidden; 
        }
        
        /* Left Sidebar */
        .sidebar-left { 
            width: 280px; 
            background: var(--sidebar-left-color); 
            height: 100vh; 
            position: fixed; 
            left: 0; 
            top: 0; 
            border-right: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 50; 
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Right Sidebar (TOOLS) */
        .sidebar-right {
            width: 260px;
            background: var(--sidebar-right-color);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 60;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }
        .sidebar-right.open { transform: translateX(0); }

        /* Desktop Condition (>1200px) */
        @media (min-width: 1200px) {
            .sidebar-right {
                transform: translateX(0);
                box-shadow: none;
                z-index: 40;
            }
            main { margin-right: 260px; }
            #tools-toggle { display: none !important; }
            .sidebar-right .close-btn { display: none; }
        }

        @media (max-width: 768px) {
            .sidebar-left { transform: translateX(-100%); }
            .sidebar-left.open { transform: translateX(0); }
            main { margin-left: 0 !important; width: 100% !important; }
        }
        
        main { 
            margin-left: 280px; 
            flex: 1; 
            padding: 1.5rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1.2rem; 
            height: 100vh; 
            transition: all 0.3s;
        }
        
        .glass { 
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
        }
        
        .link-item { 
            height: 40px; 
            background: rgba(0,0,0,0.1); 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            padding: 0 1rem; 
            border-radius: 10px; 
            margin-bottom: 5px; 
            text-decoration: none; 
            color: rgba(255,255,255,0.8); 
        }
        .link-item:hover { 
            background: rgba(255,255,255,0.1); 
            color: #fff;
            transform: translateX(4px); 
            border-color: var(--accent-red);
        }

        .tool-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .tool-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        #tools-toggle {
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: var(--accent-blue);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .calendar-wrapper {
            flex: 1;
            background: #000; 
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: invert(92%) hue-rotate(180deg) brightness(1.05) saturate(0.6);
        }

        #mobile-left-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: var(--sidebar-left-color);
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }
        @media (max-width: 768px) { #mobile-left-toggle { display: flex; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <button id="mobile-left-toggle" onclick="document.querySelector('.sidebar-left').classList.toggle('open')">
        <i class="fas fa-bars"></i>
    </button>

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar-left p-6">
        <div class="flex-shrink-0">
            <h1 class="text-2xl font-black italic tracking-tighter mb-6 text-white flex items-center gap-2">
                <span class="bg-white text-[#800040] px-1.5 rounded">GB</span> PORTAL
            </h1>
            
            <div class="space-y-3 mb-6">
                <div class="glass p-4 rounded-xl border-l-4 border-white">
                    <div id="clock" class="text-2xl font-black tracking-tighter text-white tabular-nums">00:00:00</div>
                    <div id="date" class="text-white/40 text-[9px] font-bold uppercase tracking-wider">202X/XX/XX</div>
                </div>
                <div class="glass p-3 rounded-xl flex items-center justify-between">
                    <i id="weather-icon" class="fas fa-circle-notch fa-spin text-xl text-white/20"></i>
                    <div class="text-right">
                        <div id="temp" class="text-lg font-black text-white">--°C</div>
                        <div class="text-[8px] font-bold text-white/30 uppercase">Setagaya, Tokyo</div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto custom-scrollbar pr-1">
            <!-- Essential Section -->
            <section class="mb-6">
                <h2 class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-2 italic">Essential</h2>
                <a href="https://google.com" target="_blank" class="link-item"><i class="fab fa-google w-8 opacity-50"></i><span class="text-[11px] font-bold">Google</span></a>
                <a href="https://youtube.com" target="_blank" class="link-item"><i class="fab fa-youtube w-8 opacity-50"></i><span class="text-[11px] font-bold">YouTube</span></a>
                <a href="https://maps.google.com" target="_blank" class="link-item"><i class="fas fa-map-location-dot w-8 opacity-50"></i><span class="text-[11px] font-bold">Maps</span></a>
                <a href="https://www.bloomberg.com/jp/" target="_blank" class="link-item"><i class="fas fa-chart-line w-8 opacity-50"></i><span class="text-[11px] font-bold">Bloomberg</span></a>
                <a href="https://gb-n8n.duckdns.org" target="_blank" class="link-item"><i class="fas fa-robot w-8 opacity-50"></i><span class="text-[11px] font-bold">n8n Automation</span></a>
            </section>

            <!-- Banking Section -->
            <section class="mb-6">
                <h2 class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-2 italic">Banking</h2>
                <a href="https://login.paypay-bank.co.jp" target="_blank" class="link-item"><i class="fas fa-wallet w-8 opacity-50"></i><span class="text-[11px] font-bold">PayPay Bank</span></a>
                <a href="https://fes.rakuten-bank.co.jp" target="_blank" class="link-item"><i class="fas fa-credit-card w-8 opacity-50"></i><span class="text-[11px] font-bold">Rakuten Bank</span></a>
            </section>

            <!-- GLADD Section -->
            <section>
                <h2 class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-2 italic">GLADD Discovery</h2>
                <a href="https://gladd.jp/category/home/?order=price_asc" target="_blank" class="link-item"><i class="fas fa-couch w-8 opacity-50"></i><span class="text-[11px] font-bold">Home</span></a>
                <a href="https://gladd.jp/category/mens/?order=price_asc" target="_blank" class="link-item"><i class="fas fa-shirt w-8 opacity-50"></i><span class="text-[11px] font-bold">Men's</span></a>
                <a href="https://gladd.jp/category/womens/?order=price_asc" target="_blank" class="link-item"><i class="fas fa-person-dress w-8 opacity-50"></i><span class="text-[11px] font-bold">Women's</span></a>
                <a href="https://gladd.jp/category/deli/?order=price_asc" target="_blank" class="link-item"><i class="fas fa-bowl-food w-8 opacity-50"></i><span class="text-[11px] font-bold">Gourmet</span></a>
                <a href="https://gladd.jp/category/beauty/?order=price_asc" target="_blank" class="link-item"><i class="fas fa-wand-magic-sparkles w-8 opacity-50"></i><span class="text-[11px] font-bold">Beauty</span></a>
            </section>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main>
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div class="text-[10px] font-black uppercase tracking-widest text-white/40 italic flex items-center gap-4">
                <span><i class="fas fa-terminal mr-2 text-[#ff0055]"></i>Operations Board</span>
            </div>
            
            <div class="flex items-center gap-3 w-full max-w-lg">
                <form action="https://www.google.com/search" method="GET" target="_blank" class="relative flex-1">
                    <input type="text" name="q" placeholder="Command + Search..." class="w-full glass py-2 pl-9 pr-4 rounded-xl focus:outline-none focus:ring-1 focus:ring-white/20 text-xs text-white placeholder:text-white/20">
                    <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-white/20 text-[10px]"></i>
                </form>
                
                <button id="tools-toggle">
                    <i class="fas fa-microchip"></i> TOOLS
                </button>
            </div>
        </header>

        <div class="calendar-wrapper glass">
            <iframe 
                src="https://calendar.google.com/calendar/embed?src=546b37adac3e17e0b0c6496dd3fb9e39af1376300bffab9f9b0ca424c61b392c%40group.calendar.google.com&ctz=Asia%2FTokyo&showTitle=0&showPrint=0&showTabs=0&showCalendars=0&showNav=1" 
                frameborder="0" 
                scrolling="no">
            </iframe>
        </div>
    </main>

    <!-- RIGHT SIDEBAR (TOOLS) -->
    <aside class="sidebar-right custom-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic tracking-tighter text-[#60a5fa]">TOOLS</h2>
            <button onclick="toggleRightSidebar()" class="close-btn text-white/20 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <div class="space-y-1">
            <a href="https://chatgpt.com" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">ChatGPT</span>
                <i class="fas fa-bolt text-green-400"></i>
            </a>
            <a href="https://gemini.google.com" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">Gemini</span>
                <i class="fas fa-sparkles text-blue-300"></i>
            </a>
            <a href="https://grok.com" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">Grok</span>
                <i class="fas fa-rocket text-gray-400"></i>
            </a>
            <a href="https://copilot.microsoft.com" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">Copilot</span>
                <i class="fab fa-microsoft text-blue-500"></i>
            </a>
            <a href="https://www.perplexity.ai" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">Perplexity</span>
                <i class="fas fa-magnifying-glass text-cyan-400"></i>
            </a>
            <a href="https://felo.ai" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">Felo</span>
                <i class="fas fa-magnifying-glass-plus text-yellow-500"></i>
            </a>
            <a href="https://notebooklm.google.com" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">NotebookLM</span>
                <i class="fas fa-book-open text-orange-400"></i>
            </a>
            <a href="https://huggingface.co" target="_blank" class="tool-item">
                <span class="text-[11px] font-bold">Hugging Face</span>
                <i class="fas fa-face-smile text-yellow-300"></i>
            </a>
        </div>
    </aside>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' }).toUpperCase();
            document.getElementById('clock').textContent = timeStr;
            document.getElementById('date').textContent = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6465&longitude=139.6533&current_weather=true&timezone=Asia%2FTokyo');
                const data = await res.json();
                if (!data.current_weather) return;
                document.getElementById('temp').textContent = `${Math.round(data.current_weather.temperature)}°C`;
                let icon = 'fas fa-cloud';
                const code = data.current_weather.weathercode;
                if (code === 0) icon = 'fas fa-sun text-yellow-400';
                else if (code <= 3) icon = 'fas fa-cloud-sun text-yellow-200';
                else if (code <= 67) icon = 'fas fa-cloud-showers-heavy text-blue-400';
                document.getElementById('weather-icon').className = `${icon} text-xl transition-all`;
            } catch (e) { document.getElementById('temp').textContent = "--"; }
        }
        fetchWeather();
        setInterval(fetchWeather, 600000);

        const rightSidebar = document.querySelector('.sidebar-right');
        function toggleRightSidebar() { if (window.innerWidth < 1200) rightSidebar.classList.toggle('open'); }
        document.getElementById('tools-toggle').addEventListener('click', (e) => { e.stopPropagation(); toggleRightSidebar(); });
        document.addEventListener('click', (e) => {
            if (window.innerWidth < 1200 && rightSidebar.classList.contains('open') && !rightSidebar.contains(e.target)) {
                rightSidebar.classList.remove('open');
            }
        });
    </script>
</body>
</html>
